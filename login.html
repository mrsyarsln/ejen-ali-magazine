<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M.A.T.A - Secure Terminal Login</title>
  <style>
    /* Reset & Dark Cyber Theme */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body, html {
      width: 100%;
      height: 100vh;
      font-family: 'Courier New', Courier, monospace;
      background-color: #050b14;
      color: #e0fbfc;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    /* Background Grid Styling */
    .bg-grid {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-image: linear-gradient(rgba(0, 229, 255, 0.03) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(0, 229, 255, 0.03) 1px, transparent 1px);
      background-size: 30px 30px;
      z-index: 1;
      pointer-events: none;
    }

    /* Login Box Container */
    .login-container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 420px;
      background: rgba(2, 10, 20, 0.85);
      border: 1px solid rgba(0, 229, 255, 0.3);
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 0 30px rgba(0, 229, 255, 0.15);
      backdrop-filter: blur(10px);
    }

    .login-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .login-icon {
      font-size: 2.5rem;
      margin-bottom: 10px;
      filter: drop-shadow(0 0 10px rgba(0, 229, 255, 0.6));
    }

    .login-header h1 {
      font-size: 1.8rem;
      letter-spacing: 3px;
      color: #fff;
      margin-bottom: 5px;
    }

    .login-header p {
      font-size: 0.85rem;
      color: #8892b0;
      letter-spacing: 1px;
    }

    .input-group {
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
    }

    .input-group label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #00e5ff;
      margin-bottom: 8px;
    }

    .input-group input {
      background: rgba(5, 11, 20, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 12px 15px;
      color: #fff;
      font-family: inherit;
      font-size: 0.9rem;
      border-radius: 4px;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .input-group input:focus {
      border-color: #00e5ff;
      box-shadow: 0 0 10px rgba(0, 229, 255, 0.2);
    }

    .login-btn {
      width: 100%;
      background: transparent;
      border: 1px solid #00e5ff;
      color: #00e5ff;
      padding: 12px;
      font-family: inherit;
      text-transform: uppercase;
      letter-spacing: 2px;
      cursor: pointer;
      font-size: 0.9rem;
      border-radius: 4px;
      transition: all 0.3s;
      margin-top: 10px;
    }

    .login-btn:hover {
      background: #00e5ff;
      color: #050b14;
      box-shadow: 0 0 15px rgba(0, 229, 255, 0.5);
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 25px;
      color: #8892b0;
      text-decoration: none;
      font-size: 0.8rem;
      letter-spacing: 1px;
      transition: color 0.3s;
    }

    .back-link:hover {
      color: #00e5ff;
    }

    /* Fullscreen Verification Overlay Styles */
    .iris-auth-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(5, 11, 20, 0.95);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 100;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.4s ease, visibility 0.4s ease;
      backdrop-filter: blur(8px);
    }

    .iris-auth-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    #authContent {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .auth-ring-container {
      position: relative;
      width: 120px;
      height: 120px;
      margin-bottom: 25px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .auth-ring {
      position: absolute;
      border-radius: 50%;
      border: 2px solid transparent;
    }

    .auth-ring-inner {
      width: 80px;
      height: 80px;
      border-top-color: #00e5ff;
      border-bottom-color: #00e5ff;
      animation: spinClockwise 1.2s linear infinite;
    }

    .auth-ring-outer {
      width: 120px;
      height: 120px;
      border-left-color: #00e5ff;
      border-right-color: #00e5ff;
      animation: spinCounter 1.8s linear infinite;
    }

    .auth-text {
      color: #00e5ff;
      font-size: 1.1rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(0, 229, 255, 0.6);
    }

    /* Success State Animations */
    #authContent.auth-success .auth-ring-inner {
      border-color: #00ff66;
      animation: none;
      box-shadow: 0 0 15px rgba(0, 255, 102, 0.6);
    }

    #authContent.auth-success .auth-ring-outer {
      border-color: #00ff66;
      animation: none;
      box-shadow: 0 0 15px rgba(0, 255, 102, 0.4);
    }

    #authContent.auth-success .auth-text {
      color: #00ff66;
      text-shadow: 0 0 10px rgba(0, 255, 102, 0.8);
    }

    @keyframes spinClockwise {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes spinCounter {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(-360deg); }
    }
  </style>
</head>
<body>

  <!-- Audio Elemen untuk mengekalkan lagu merentasi halaman -->
  <audio id="bgAudio" src="song ejen ali.mp3" preload="auto" loop></audio>

  <div class="bg-grid"></div>

  <!-- Login Form Box -->
  <div class="login-container" id="loginBox">
    <div class="login-header">
      <div class="login-icon">🛡️</div>
      <h1>M.A.T.A</h1>
      <p>Secure Terminal Login</p>
    </div>

    <form id="authForm" onsubmit="triggerVerification(event)">
      <div class="input-group">
        <label for="agentId">Agent ID</label>
        <input type="text" id="agentId" placeholder="ENTER AGENT IDENTIFIER" required autocomplete="off">
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="ENTER SECURITY PASSCODE" required>
      </div>

      <button type="submit" class="login-btn">Login</button>
    </form>

    <!-- Updated link destination to home.html dengan fungsi audio -->
    <a href="home.html" class="back-link" onclick="saveAudioState()">← RETURN TO COMMAND CENTER</a>
  </div>

  <!-- Fullscreen Verification Overlay -->
  <div id="irisAuthOverlay" class="iris-auth-overlay">
    <div id="authContent">
      <div class="auth-ring-container">
        <div class="auth-ring auth-ring-inner"></div>
        <div class="auth-ring auth-ring-outer"></div>
      </div>
      <div id="authText" class="auth-text">Verifying Agent Identity...</div>
    </div>
  </div>

  <script>
    const bgAudio = document.getElementById('bgAudio');

    // Baca masa semasa lagu dari LocalStorage apabila halaman dimuatkan
    window.addEventListener('DOMContentLoaded', () => {
      const savedTime = localStorage.getItem('ejenAliAudioTime');
      const isPlaying = localStorage.getItem('ejenAliAudioPlaying') === 'true';

      if (savedTime) {
        bgAudio.currentTime = parseFloat(savedTime);
      }

      if (isPlaying) {
        bgAudio.play().catch(() => {
          // Jika pelayar menyekat autoplay, buka kunci dengan klik pertama
          const unlockAudio = () => {
            bgAudio.play();
            localStorage.setItem('ejenAliAudioPlaying', 'true');
            window.removeEventListener('click', unlockAudio);
          };
          window.addEventListener('click', unlockAudio);
        });
      }
    });

    // Simpan masa lagu ke LocalStorage setiap 0.5 saat
    setInterval(() => {
      if (!bgAudio.paused) {
        localStorage.setItem('ejenAliAudioTime', bgAudio.currentTime);
        localStorage.setItem('ejenAliAudioPlaying', 'true');
      }
    }, 500);

    // Fungsi untuk simpan status audio sebelum beralih halaman
    function saveAudioState() {
      localStorage.setItem('ejenAliAudioTime', bgAudio.currentTime);
      localStorage.setItem('ejenAliAudioPlaying', !bgAudio.paused);
    }

    function triggerVerification(e) {
      e.preventDefault();

      const overlay = document.getElementById('irisAuthOverlay');
      const authContent = document.getElementById('authContent');
      const authText = document.getElementById('authText');

      // Reset state for clean animation sequence
      authContent.classList.remove('auth-success');
      authText.innerHTML = "Verifying Agent Identity...";
      overlay.classList.add('active');

      // Pastikan lagu dimainkan apabila log masuk berjaya
      if (bgAudio.paused) {
        bgAudio.play();
      }

      // Stage 1: Loading phase (2 seconds)
      setTimeout(() => {
        // Stage 2: Success State
        authContent.classList.add('auth-success');
        authText.innerHTML = "ACCESS GRANTED<br><span style='font-size:0.85rem; letter-spacing:2px;'>Welcome, Agent.</span>";

        // Simpan status audio aktif
        saveAudioState();

        // Stage 3: Automatic redirection to home.html after 1.5 seconds
        setTimeout(() => {
          window.location.href = 'home.html';
        }, 1500);

      }, 2000);
    }
  </script>
</body>
</html>
