<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M.A.T.A - Drop Us A Line</title>
  <style>
    /* Reset & Dark Cyberaya Theme */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Courier New', Courier, monospace;
      background-color: #050b14;
      color: #e0fbfc;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
      overflow-x: hidden;
    }

    /* --- PAGE BACKGROUND WITH BLENDED HERO IMAGE --- */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      right: 0;
      width: 600px;
      height: 400px;
      background-image: url('bg1.jpg');
      background-position: top right;
      background-repeat: no-repeat;
      background-size: contain;
      opacity: 0.25;
      pointer-events: none;
      z-index: -1;
      mask-image: radial-gradient(circle at 100% 0%, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 80%);
      -webkit-mask-image: radial-gradient(circle at 100% 0%, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 80%);
    }

    /* Top Navigation Bar */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 30px 50px;
      border-bottom: 1px solid rgba(0, 229, 255, 0.1);
      position: relative;
      z-index: 1;
    }

    .logo img {
      height: 100px;
      width: auto;
      display: block;
      filter: drop-shadow(0 0 8px rgba(0, 229, 255, 0.6));
    }

    /* Main Section Layout */
    .main-section {
      display: flex;
      justify-content: space-between;
      padding: 60px 50px;
      flex-grow: 1;
      gap: 50px;
      position: relative;
      z-index: 1;
    }

    /* Left Column: Info & Details */
    .left-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      text-shadow: 0 0 3px rgba(5, 11, 20, 0.9);
    }

    .title-area h1 {
      font-size: 3.5rem;
      letter-spacing: 2px;
      color: #fff;
      margin-bottom: 15px;
    }

    .title-area p {
      color: #e0fbfc;
      font-size: 1rem;
      line-height: 1.5;
      max-width: 400px;
    }

    .contact-details {
      margin-top: 40px;
      font-size: 0.95rem;
      line-height: 1.8;
      color: #e0fbfc;
    }

    .contact-details span {
      color: #00e5ff;
    }

    /* Right Column: Interactive Form */
    .right-form {
      flex: 1.2;
      background: rgba(2, 10, 20, 0.7);
      border: 1px solid rgba(0, 229, 255, 0.2);
      padding: 40px;
      border-radius: 4px;
      backdrop-filter: blur(10px);
    }

    .form-row {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
    }

    .form-group {
      flex: 1;
      display: flex;
      flex-direction: column;
      margin-bottom: 20px;
    }

    .form-group label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #00e5ff;
      margin-bottom: 8px;
    }

    .form-group input, 
    .form-group textarea {
      background: rgba(5, 11, 20, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 12px 15px;
      color: #fff;
      font-family: inherit;
      font-size: 0.95rem;
      border-radius: 2px;
      outline: none;
      transition: border-color 0.3s;
    }

    .form-group input:focus, 
    .form-group textarea:focus {
      border-color: #00e5ff;
    }

    .form-group textarea {
      resize: vertical;
      height: 100px;
    }

    .submit-btn {
      background: transparent;
      border: 1px solid #00e5ff;
      color: #00e5ff;
      padding: 12px 30px;
      font-family: inherit;
      text-transform: uppercase;
      letter-spacing: 2px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.3s;
    }

    .submit-btn:hover {
      background: #00e5ff;
      color: #050b14;
    }

    /* Footer Bottom Bar */
    footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 50px;
      border-top: 1px solid rgba(0, 229, 255, 0.1);
      font-size: 0.85rem;
      color: #8892b0;
      position: relative;
      z-index: 1;
    }

    /* Back Link Styling */
    .back-link {
      color: #8892b0;
      text-decoration: none;
      letter-spacing: 1px;
      transition: all 0.3s ease;
    }

    .back-link:hover {
      color: #00e5ff;
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <!-- Audio Elemen untuk mengekalkan lagu merentasi halaman -->
  <audio id="bgAudio" src="song ejen ali.mp3" preload="auto" loop></audio>

  <!-- Top Navigation -->
  <nav>
    <div class="logo">
      <img src="ejenali.png" alt="Ejen Ali Logo">
    </div>
  </nav>

  <!-- Main Dispatch Section -->
  <div class="main-section">
    
    <!-- Left Details -->
    <div class="left-info">
      <div class="title-area">
        <h1>JOIN OUR<br>AGENTS TODAY</h1>
        <p>Become part of M.A.T.A.’s elite force and embark on thrilling missions to protect Cyberaya. Train, improve your skills, and fight alongside the best agents.</p>
      </div>

      <div class="contact-details">
        <p>HQ LOCATION: <span>Cyberaya Central, Sector 4</span></p>
        <p>PHONE: <span>+60 3 8000 2026</span></p>
        <p>EMAIL: <span>dispatch@mata.gov.my</span></p>
      </div>
    </div>

    <!-- Right Form -->
    <div class="right-form">
      <form>
        <div class="form-row">
          <div class="form-group">
            <label>First Name*</label>
            <input type="text" placeholder="Enter first name" required>
          </div>
          <div class="form-group">
            <label>Last Name*</label>
            <input type="text" placeholder="Enter last name" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Email*</label>
            <input type="email" placeholder="agent@mata.gov.my" required>
          </div>
          <div class="form-group">
            <label>Phone*</label>
            <input type="tel" placeholder="+60 Enter phone number" required>
          </div>
        </div>

        <div class="form-group">
          <label>Message*</label>
          <textarea placeholder="Type your mission brief or message here..." required></textarea>
        </div>

        <button type="submit" class="submit-btn">Get In Touch</button>
      </form>
    </div>

  </div>

  <!-- Bottom Bar dengan fungsi simpan masa audio -->
  <footer>
    <a href="home.html" class="back-link" onclick="saveAudioState()">&larr; BACK TO HOME</a>
  </footer>

  <script>
    const bgAudio = document.getElementById('bgAudio');

    // Baca masa semasa lagu dari LocalStorage apabila halaman dimuatkan
    window.addEventListener('DOMContentLoaded', () => {
      const savedTime = localStorage.getItem('ejenAliAudioTime');
      const isPlaying = localStorage.getItem('ejenAliAudioPlaying') === 'true';

      if (savedTime) {
        bgAudio.currentTime = parseFloat(savedTime);
      }

      if (isPlaying) {
        bgAudio.play().catch(() => {
          // Jika pelayar menyekat autoplay, buka kunci dengan klik pertama
          const unlockAudio = () => {
            bgAudio.play();
            localStorage.setItem('ejenAliAudioPlaying', 'true');
            window.removeEventListener('click', unlockAudio);
          };
          window.addEventListener('click', unlockAudio);
        });
      }
    });

    // Simpan masa lagu ke LocalStorage setiap 0.5 saat
    setInterval(() => {
      if (!bgAudio.paused) {
        localStorage.setItem('ejenAliAudioTime', bgAudio.currentTime);
        localStorage.setItem('ejenAliAudioPlaying', 'true');
      }
    }, 500);

    // Fungsi untuk simpan status apabila klik butang Kembali (Back)
    function saveAudioState() {
      localStorage.setItem('ejenAliAudioTime', bgAudio.currentTime);
      localStorage.setItem('ejenAliAudioPlaying', !bgAudio.paused);
    }
  </script>

</body>
</html>
