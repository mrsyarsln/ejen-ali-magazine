<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M.A.T.A - I.R.I.S System Initialization</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body, html {
      width: 100%;
      height: 100vh;
      overflow: hidden;
      background-color: #020408;
      font-family: 'Courier New', Courier, monospace;
    }

    /* Fixed Viewport Container */
    .viewport {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: radial-gradient(circle at center, #06101e 0%, #020408 80%);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      z-index: 100;
      transition: opacity 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
      transform-origin: center center;
    }

    /* Multi-layered Animated Grid & Digital Noise */
    .bg-grid {
      position: absolute;
      width: 300%;
      height: 300%;
      background-image: 
        linear-gradient(rgba(0, 242, 255, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 242, 255, 0.04) 1px, transparent 1px);
      background-size: 50px 50px;
      animation: gridDrift 25s linear infinite;
      z-index: 0;
    }

    @keyframes gridDrift {
      0% { transform: translate(-15%, -15%) rotate(0deg); }
      100% { transform: translate(0%, 0%) rotate(0deg); }
    }

    /* Full-Screen Vertical Scan */
    .fullscreen-scanner {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 25;
      background: linear-gradient(
        to bottom,
        transparent 0%,
        rgba(0, 229, 255, 0.02) 45%,
        rgba(0, 229, 255, 0.15) 50%,
        rgba(0, 229, 255, 0.02) 55%,
        transparent 100%
      );
      transform: translateY(-100%);
      animation: topToBottomScan 5s linear infinite;
    }

    @keyframes topToBottomScan {
      0% { transform: translateY(-100%); }
      100% { transform: translateY(100%); }
    }

    /* Full-Screen Horizontal Scan */
    .horizontal-edge-scanner {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 27;
      background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(0, 229, 255, 0.02) 45%,
        rgba(0, 229, 255, 0.15) 50%,
        rgba(0, 229, 255, 0.02) 55%,
        transparent 100%
      );
      transform: translateX(-100vw);
      animation: leftToRightScan 4s linear infinite;
    }

    @keyframes leftToRightScan {
      0% { transform: translateX(-100vw); }
      100% { transform: translateX(100vw); }
    }

    /* Fine, Elegant Blue Scan Lines */
    .scanlines {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 26;
      background: linear-gradient(
        to bottom,
        rgba(255,255,255,0),
        rgba(255,255,255,0) 50%,
        rgba(0, 229, 255, 0.012) 50%,
        rgba(0, 229, 255, 0.012)
      );
      background-size: 100% 2px;
    }

    /* HUD Interface Elements & Rotating Targeting Rings */
    .hud-layer {
      position: absolute;
      width: 700px;
      height: 700px;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 2;
      opacity: 0;
      animation: hudFadeIn 1.5s ease-out forwards;
      animation-delay: 0.3s;
    }

    @keyframes hudFadeIn {
      to { opacity: 0.8; }
    }

    .hud-ring {
      position: absolute;
      border-radius: 50%;
      border: 1px dashed rgba(0, 229, 255, 0.25);
    }

    .hud-ring-1 {
      width: 620px;
      height: 620px;
      border: 2px solid rgba(0, 229, 255, 0.15);
      border-top: 2px solid rgba(0, 229, 255, 0.8);
      border-bottom: 2px solid rgba(0, 229, 255, 0.8);
      animation: spinClockwise 20s linear infinite;
    }

    .hud-ring-2 {
      width: 520px;
      height: 520px;
      border: 1px dotted rgba(255, 0, 98, 0.3);
      border-left: 2px solid rgba(255, 0, 98, 0.8);
      border-right: 2px solid rgba(255, 0, 98, 0.8);
      animation: spinCounterClockwise 15s linear infinite;
    }

    .hud-ring-3 {
      width: 420px;
      height: 420px;
      border: 1px solid rgba(0, 229, 255, 0.4);
      box-shadow: 0 0 15px rgba(0, 229, 255, 0.2) inset;
      animation: pulseHud 3s ease-in-out infinite alternate;
    }

    @keyframes spinClockwise {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes spinCounterClockwise {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(-360deg); }
    }

    @keyframes pulseHud {
      0% { transform: scale(0.98); opacity: 0.4; }
      100% { transform: scale(1.02); opacity: 0.8; }
    }

    /* Floating Digital Light Particles */
    .particle {
      position: absolute;
      background: #00e5ff;
      box-shadow: 0 0 8px #00e5ff;
      border-radius: 50%;
      pointer-events: none;
      z-index: 3;
      opacity: 0;
      animation: floatParticle 4s ease-in-out infinite;
    }

    @keyframes floatParticle {
      0% { transform: translateY(100px) scale(0); opacity: 0; }
      50% { opacity: 0.8; }
      100% { transform: translateY(-300px) scale(1.2); opacity: 0; }
    }

    /* Main Cinematic Sequence Container */
    .cinematic-container {
      position: relative;
      width: 600px;
      height: 600px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      transform: scale(0.1);
      transform-origin: center center;
      opacity: 0;
      will-change: transform, filter, opacity;
      animation: cinematicScaleUp 4.2s cubic-bezier(0.15, 0.85, 0.25, 1) forwards;
    }

    @keyframes cinematicScaleUp {
      0% { transform: scale(0.05); opacity: 0; filter: blur(15px); }
      20% { opacity: 1; filter: blur(4px); }
      100% { transform: scale(1); filter: blur(0px); opacity: 1; }
    }

    /* Enlarged IRIS Logo */
    .iris-logo {
      position: relative;
      width: 380px;
      height: 380px;
      object-fit: contain;
      z-index: 5;
      animation: logoBootSequence 4s ease-out forwards, periodicGlitch 6s ease-in-out infinite;
      animation-delay: 0s, 4s;
    }

    @keyframes logoBootSequence {
      0% {
        clip-path: inset(50% 0 50% 0);
        filter: drop-shadow(0 0 0 rgba(0, 229, 255, 0));
      }
      15% {
        clip-path: inset(10% 0 85% 0);
        filter: drop-shadow(-15px 0 5px rgba(255, 0, 98, 0.8)) drop-shadow(15px 0 5px rgba(0, 229, 255, 0.8));
      }
      30% {
        clip-path: inset(0 0 0 0);
        filter: drop-shadow(0 0 35px rgba(0, 229, 255, 0.9)) brightness(1.4);
      }
      100% {
        clip-path: inset(0 0 0 0);
        filter: drop-shadow(0 0 25px rgba(0, 229, 255, 0.6)) brightness(1);
      }
    }

    @keyframes periodicGlitch {
      0%, 92%, 100% { transform: translate(0); filter: drop-shadow(0 0 25px rgba(0, 229, 255, 0.6)); }
      93% { transform: translate(-3px, 2px); filter: drop-shadow(4px 0 0 rgba(255, 0, 98, 0.9)) drop-shadow(-4px 0 0 rgba(0, 229, 255, 0.9)); }
      95% { transform: translate(3px, -1px); filter: drop-shadow(-4px 0 0 rgba(255, 0, 98, 0.9)) drop-shadow(4px 0 0 rgba(0, 229, 255, 0.9)); }
      97% { transform: translate(0); filter: drop-shadow(0 0 35px rgba(0, 229, 255, 0.9)) brightness(1.3); }
    }

    /* Holographic Light Streaks */
    .holographic-flare {
      position: absolute;
      top: 0; left: -100%;
      width: 40%; height: 100%;
      background: linear-gradient(
        to right,
        transparent,
        rgba(0, 229, 255, 0.35),
        transparent
      );
      transform: skewX(-25deg);
      z-index: 15;
      mix-blend-mode: screen;
      opacity: 0;
      animation: flareMove 4s ease-in-out infinite, fadeInFlare 0.5s ease-in forwards;
      animation-delay: 1s, 1s;
      pointer-events: none;
    }

    @keyframes flareMove {
      0% { left: -120%; }
      100% { left: 220%; }
    }

    @keyframes fadeInFlare {
      to { opacity: 1; }
    }

    /* Soft Center Activation Pulse */
    .center-pulse {
      position: absolute;
      width: 140px;
      height: 140px;
      background: radial-gradient(circle, rgba(0, 229, 255, 0.85) 0%, rgba(0, 100, 255, 0.2) 60%, transparent 80%);
      border-radius: 50%;
      z-index: 1;
      animation: activatePulse 2.5s ease-out infinite;
      opacity: 0;
      animation-delay: 0.8s;
    }

    @keyframes activatePulse {
      0% { transform: scale(0.4); opacity: 0.9; }
      100% { transform: scale(3.5); opacity: 0; }
    }

    /* Loading Status Messages Container */
    .terminal-status-wrapper {
      position: absolute;
      bottom: 25px;
      width: 100%;
      display: flex;
      justify-content: center;
      z-index: 20;
    }

    .terminal-status-box {
      font-family: 'Courier New', Courier, monospace;
      font-size: 1.1rem;
      letter-spacing: 5px;
      color: #00e5ff;
      text-shadow: 0 0 10px rgba(0, 229, 255, 0.9);
      text-transform: uppercase;
      display: flex;
      align-items: center;
      opacity: 0;
      transition: opacity 0.15s ease-in-out;
    }

    .terminal-cursor {
      display: inline-block;
      width: 10px;
      height: 20px;
      background-color: #00e5ff;
      margin-left: 5px;
      box-shadow: 0 0 8px #00e5ff;
      animation: cursorBlink 0.5s step-end infinite;
    }

    @keyframes cursorBlink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* Final "COMPLETE" Overlay */
    .complete-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 50;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s ease-in;
    }

    .complete-box {
      font-family: 'Courier New', Courier, monospace;
      font-size: 3rem;
      letter-spacing: 12px;
      color: #00e5ff;
      text-transform: uppercase;
      text-shadow: 0 0 25px rgba(0, 229, 255, 1), 0 0 50px rgba(0, 229, 255, 0.7);
      background: rgba(2, 6, 14, 0.9);
      padding: 24px 48px;
      border: 2px solid rgba(0, 229, 255, 0.7);
      box-shadow: 0 0 35px rgba(0, 229, 255, 0.4) inset, 0 0 30px rgba(0, 229, 255, 0.5);
      backdrop-filter: blur(6px);
    }

    .complete-glitch {
      animation: completeGlitchEffect 0.35s ease-in-out;
    }

    @keyframes completeGlitchEffect {
      0%, 100% { transform: translate(0); filter: drop-shadow(0 0 25px rgba(0, 229, 255, 1)); }
      30% { transform: translate(-4px, 2px); filter: drop-shadow(5px 0 0 rgba(255, 0, 98, 0.9)) drop-shadow(-5px 0 0 rgba(0, 229, 255, 0.9)); }
      60% { transform: translate(4px, -2px); filter: drop-shadow(-5px 0 0 rgba(255, 0, 98, 0.9)) drop-shadow(5px 0 0 rgba(0, 229, 255, 0.9)); }
    }
  </style>
</head>
<body>

  <!-- Audio Background Element (Tambahan agar introMusic tidak null) -->
  <audio id="introMusic" src="audio.mp3" preload="auto" loop></audio>

  <!-- Intro Viewport -->
  <div class="viewport" id="viewport">
    <div class="bg-grid"></div>
    <div class="scanlines"></div>
    <div class="fullscreen-scanner"></div>
    <div class="horizontal-edge-scanner"></div>

    <!-- HUD Targeting Rings -->
    <div class="hud-layer">
      <div class="hud-ring hud-ring-1"></div>
      <div class="hud-ring hud-ring-2"></div>
      <div class="hud-ring hud-ring-3"></div>
    </div>

    <!-- Floating Digital Particles -->
    <div class="particle" style="left: 20%; width: 3px; height: 3px; animation-delay: 0.2s;"></div>
    <div class="particle" style="left: 40%; width: 2px; height: 2px; animation-delay: 1.2s;"></div>
    <div class="particle" style="left: 60%; width: 4px; height: 4px; animation-delay: 0.7s;"></div>
    <div class="particle" style="left: 80%; width: 3px; height: 3px; animation-delay: 2.0s;"></div>

    <!-- Main Cinematic Logo & Effects -->
    <div class="cinematic-container" id="zoomContainer">
      <div class="center-pulse"></div>
      <img src="iris-logo.png" class="iris-logo" alt="I.R.I.S" onerror="this.src='irislogo.png';">
      <div class="holographic-flare"></div>
    </div>

    <!-- Loading Messages -->
    <div class="terminal-status-wrapper">
      <div class="terminal-status-box" id="statusBox">
        <span id="statusText"></span>
        <span class="terminal-cursor"></span>
      </div>
    </div>

    <!-- Final "COMPLETE" Overlay -->
    <div class="complete-overlay" id="completeOverlay">
      <div class="complete-box" id="completeBox">COMPLETE</div>
    </div>
  </div>

  <script>
    const zoomContainer = document.getElementById('zoomContainer');
    const viewport = document.getElementById('viewport');
    const statusBox = document.getElementById('statusBox');
    const statusText = document.getElementById('statusText');
    const completeOverlay = document.getElementById('completeOverlay');
    const completeBox = document.getElementById('completeBox');
    const introMusic = document.getElementById('introMusic');

    const loadingSteps = [
      "INITIALIZING IRIS SYSTEM...",
      "SCANNING...",
      "VERIFYING DATA...",
      "AUTHENTICATING USER..."
    ];

    let currentStepIndex = 0;

    // Play music immediately, with standard browser fallback handler for user interaction policies
    function playAudio() {
      if (!introMusic) return;
      introMusic.volume = 0.8;
      introMusic.play().catch(() => {
        const unlockAudio = () => {
          introMusic.play();
          window.removeEventListener('click', unlockAudio);
          window.removeEventListener('keydown', unlockAudio);
          window.removeEventListener('touchstart', unlockAudio);
        };
        window.addEventListener('click', unlockAudio);
        window.addEventListener('keydown', unlockAudio);
        window.addEventListener('touchstart', unlockAudio);
      });
    }

    window.addEventListener('DOMContentLoaded', () => {
      playAudio();
    });

    function runTypewriter(text, callback) {
      statusBox.style.opacity = '1';
      statusText.textContent = '';
      let charIndex = 0;

      const typingInterval = setInterval(() => {
        if (charIndex < text.length) {
          statusText.textContent += text.charAt(charIndex);
          charIndex++;
        } else {
          clearInterval(typingInterval);
          setTimeout(callback, 650);
        }
      }, 35);
    }

    function executeLoadingSequence() {
      if (currentStepIndex < loadingSteps.length) {
        runTypewriter(loadingSteps[currentStepIndex], () => {
          currentStepIndex++;
          if (currentStepIndex < loadingSteps.length) {
            statusBox.style.opacity = '0';
            setTimeout(executeLoadingSequence, 200);
          } else {
            statusBox.style.opacity = '0';
            setTimeout(showCompleteScreen, 300);
          }
        });
      }
    }

    function showCompleteScreen() {
      completeOverlay.style.opacity = '1';
      completeBox.classList.add('complete-glitch');

      setTimeout(() => {
        triggerSeamlessTransition();
      }, 1000);
    }

    setTimeout(() => {
      executeLoadingSequence();
    }, 1200);

    function triggerSeamlessTransition() {
      zoomContainer.style.transform = 'scale(22)';
      zoomContainer.style.filter = 'blur(10px)';
      completeOverlay.style.opacity = '0';
      
      // Smooth fade out before shifting to home.html
      let fadeOut = setInterval(() => {
        if (introMusic && introMusic.volume > 0.1) {
          introMusic.volume -= 0.1;
        } else {
          clearInterval(fadeOut);
          if (introMusic) introMusic.pause();
        }
      }, 50);

      setTimeout(() => {
        window.location.href = 'home.html';
      }, 500);
    }
  </script>
</body>
</html>
